<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat de Ciencias Naturales y Medicina</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .chat-container {
        width: 450px;
        height: 650px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .header {
        background: #1f7a8c;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }

    .chat-box {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
    }

    .message {
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 10px;
        max-width: 80%;
    }

    .user {
        background: #d9fdd3;
        margin-left: auto;
    }

    .bot {
        background: #e8eef7;
    }

    .input-area {
        display: flex;
        border-top: 1px solid #ddd;
    }

    input {
        flex: 1;
        border: none;
        padding: 15px;
        font-size: 16px;
        outline: none;
    }

    button {
        border: none;
        background: #1f7a8c;
        color: white;
        padding: 15px 20px;
        cursor: pointer;
    }

    button:hover {
        background: #155d6b;
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        Chat de Ciencias Naturales y Medicina
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hola. Solo respondo preguntas sobre ciencias naturales y medicina.
        </div>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="userInput"
            placeholder="Escribe tu pregunta..."
            onkeypress="if(event.key==='Enter') enviarMensaje()"
        >
        <button onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
const palabrasPermitidas = [
    "biología", "biologia",
    "química", "quimica",
    "física", "fisica",
    "medicina", "salud",
    "anatomía", "anatomia",
    "célula", "celula",
    "genética", "genetica",
    "virus", "bacteria",
    "ecosistema",
    "órgano", "organo",
    "enfermedad",
    "sistema nervioso",
    "sangre",
    "ADN",
    "vacuna",
    "farmacología",
    "farmacologia"
];

function agregarMensaje(texto, tipo) {
    const chatBox = document.getElementById("chatBox");

    const mensaje = document.createElement("div");
    mensaje.className = "message " + tipo;
    mensaje.textContent = texto;

    chatBox.appendChild(mensaje);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function esTemaPermitido(texto) {
    texto = texto.toLowerCase();

    return palabrasPermitidas.some(palabra =>
        texto.includes(palabra.toLowerCase())
    );
}

function enviarMensaje() {
    const input = document.getElementById("userInput");
    const texto = input.value.trim();

    if (!texto) return;

    agregarMensaje(texto, "user");

    if (esTemaPermitido(texto)) {
        agregarMensaje(
            "La pregunta parece relacionada con ciencias naturales o medicina. Aquí podrías conectar una IA para generar una respuesta especializada.",
            "bot"
        );
    } else {
        agregarMensaje(
            "Lo siento, solo puedo responder preguntas sobre ciencias naturales y medicina.",
            "bot"
        );
    }

    input.value = "";
}
</script>

</body>
</html>
